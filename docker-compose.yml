services:
  backend:
    build: ./backend
    container_name: scenetrip-backend
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-exp}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY:-}
      - GOOGLE_ROUTES_API_KEY=${GOOGLE_ROUTES_API_KEY:-}
      - SESSION_TTL_MINUTES=${SESSION_TTL_MINUTES:-120}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    container_name: scenetrip-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
