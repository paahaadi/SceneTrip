server {
    listen $PORT;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — fall back to index.html for any non-asset path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No-cache the entry HTML so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
