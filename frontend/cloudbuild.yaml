steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - --build-arg
      - VITE_API_BASE=${_VITE_API_BASE}
      - -t
      - gcr.io/$PROJECT_ID/scenetrip-frontend
      - .
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/scenetrip-frontend']

images:
  - 'gcr.io/$PROJECT_ID/scenetrip-frontend'

substitutions:
  _VITE_API_BASE: ''
